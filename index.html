<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#06090f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="Vidyai — AI Voice Study Companion by Zoraak Technologies" />
  <title>Vidyai — AI Voice Study Companion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #06090f; font-family: 'Sora', sans-serif; overflow-x: hidden; }
    #root { min-height: 100vh; }
    #loading-screen {
      position: fixed; inset: 0; background: #06090f;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }
    #loading-screen.hide { opacity: 0; pointer-events: none; }
    .load-logo {
      width: 64px; height: 64px; margin-bottom: 20px;
      animation: loadSpin 1.5s ease-in-out infinite;
    }
    .load-text { color: #2dd4bf; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
    .load-sub { color: rgba(148,163,184,0.5); font-size: 12px; margin-top: 8px; }
    .load-bar {
      width: 120px; height: 3px; background: rgba(45,212,191,0.15);
      border-radius: 99px; margin-top: 20px; overflow: hidden;
    }
    .load-bar-fill {
      height: 100%; width: 0%; background: linear-gradient(90deg,#2dd4bf,#7c3aed);
      border-radius: 99px; animation: loadBar 2s ease forwards;
    }
    @keyframes loadSpin { 0%,100%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.1)} }
    @keyframes loadBar { 0%{width:0%} 100%{width:100%} }
  </style>
</head>
<body>
  <div id="loading-screen">
    <svg class="load-logo" viewBox="0 0 52 52">
      <defs><linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#2dd4bf"/><stop offset="100%" stop-color="#0d9488"/>
      </linearGradient></defs>
      <path d="M26 2 L49 14 L49 38 L26 50 L3 38 L3 14 Z" fill="url(#lg1)" opacity="0.95"/>
      <path d="M14 17 L26 35 L38 17" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <circle cx="26" cy="11" r="2.5" fill="white" opacity="0.85"/>
    </svg>
    <div class="load-text">Vidyai</div>
    <div class="load-sub">AI Voice Study Companion</div>
    <div class="load-bar"><div class="load-bar-fill"></div></div>
  </div>

  <div id="root"></div>

  <script>
    const hideLoadingScreen = () => {
      const ls = document.getElementById('loading-screen');
      if (ls) { ls.classList.add('hide'); setTimeout(() => ls.remove(), 600); }
    };
    const showAppError = (msg) => {
      hideLoadingScreen();
      if (document.getElementById('app-error-panel')) return;
      const panel = document.createElement('div');
      panel.id = 'app-error-panel';
      panel.style.background = '#06090f';
      panel.style.color = '#fff';
      panel.style.position = 'fixed';
      panel.style.inset = '0';
      panel.style.zIndex = '10000';
      panel.style.display = 'flex';
      panel.style.alignItems = 'center';
      panel.style.justifyContent = 'center';
      panel.style.padding = '24px';
      panel.style.textAlign = 'center';
      panel.style.fontFamily = 'Arial, sans-serif';
      panel.innerHTML = `<div style="max-width:480px;line-height:1.6;"><div style="font-size:22px;font-weight:700;margin-bottom:12px">Unable to load Vidyai</div><div style="color:rgba(255,255,255,0.88);">${msg}</div><div style="margin-top:16px;font-size:14px;color:rgba(148,163,184,0.9);">Please refresh the page or check your internet connection.</div></div>`;
      document.body.appendChild(panel);
    };
    window.addEventListener('error', (event) => {
      console.error('App load error:', event.error || event.message);
      showAppError('An unexpected error occurred while opening the app.');
    }, true);
    window.addEventListener('unhandledrejection', (event) => {
      console.error('Unhandled rejection:', event.reason);
      showAppError('An unexpected error occurred while opening the app.');
    }, true);
  </script>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
